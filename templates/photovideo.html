<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos & Vidéos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/photovideo.css" />
  </head>
  <body>
    <div class="title">
      <p>Galerie</p>
      <h3>Photos & Vidéos</h3>
    </div>

    <div class="filtres">
      <button class="btn-filtre actif" data-filter="tous">Tous</button>
      <button class="btn-filtre" data-filter="album-2024">Album 2024</button>
      <button class="btn-filtre" data-filter="album-2025">Album 2025</button>
    </div>

    <div class="galerie-grid">
      <!-- Rangée 1 + 2 : tall à gauche occupe 2 lignes, 3 normaux à sa droite sur ligne 1, wide + normal sur ligne 2 -->
      <div class="galerie-item tall album-2024">
        <img src="../assets/img/frelon_resultat.jpg" alt="Frelon" />
      </div>

      <div class="galerie-item album-2025">
        <img src="../assets/img/nid_resultat.jpg" alt="Nid" />
      </div>

      <div class="galerie-item album-2024">
        <img src="../assets/img/frelon_resultat.jpg" alt="Frelon" />
      </div>

      <div class="galerie-item album-2025">
        <img src="../assets/img/nid_resultat.jpg" alt="Nid" />
      </div>

      <!-- Le wide prend 2 colonnes et se place juste sous les 2 normaux de droite -->
      <div class="galerie-item wide album-2024">
        <img src="../assets/img/frelon_resultat.jpg" alt="Frelon" />
      </div>

      <div class="galerie-item album-2025">
        <img src="../assets/img/nid_resultat.jpg" alt="Nid" />
      </div>

      <!-- Rangée 3 : 4 normaux, la grille se ferme proprement -->
      <div class="galerie-item album-2024">
        <img src="../assets/img/frelon_resultat.jpg" alt="Frelon" />
      </div>

      <div class="galerie-item album-2025">
        <img src="../assets/img/nid_resultat.jpg" alt="Nid" />
      </div>

      <div class="galerie-item album-2024">
        <img src="../assets/img/frelon_resultat.jpg" alt="Frelon" />
      </div>

      <div class="galerie-item album-2025">
        <img src="../assets/img/nid_resultat.jpg" alt="Nid" />
      </div>
    </div>

    <script src="../assets/script/photovideo.js"></script>
  </body>
</html>
